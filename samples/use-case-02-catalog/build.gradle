plugins {
    id 'java'
    id 'antlr'
    id 'name.jurgenei.gradle.antlr'
}

repositories {
    mavenCentral()
}

dependencies {
    antlr 'org.antlr:antlr4:4.13.2'
    implementation 'org.antlr:antlr4-runtime:4.13.2'
    implementation rootProject
}

tasks.named('xmlast', name.jurgenei.gradle.antlr.XmlAstGradleTask) {
    dependsOn rootProject.tasks.named('compileAntlrSources')
    sourceDirectory.set(rootProject.layout.projectDirectory.dir('src/test/resources/plsql'))
    destinationDirectory.set(layout.buildDirectory.dir('xmlast-samples'))

    catalogFile.set(layout.projectDirectory.file('catalog.xml'))
    catalogGrammar.set('plsql')

    // Optional override. If omitted, parser/lexer values from catalog are used.
    parserClassName.set('name.jurgenei.parsers.PlSqlParser')
    lexerClassName.set('name.jurgenei.parsers.PlSqlLexer')

    includes.set(['**/*.sql'])
    targetExtension.set('.xml')
    runtimeClasspath.from(
        configurations.runtimeClasspath,
        rootProject.layout.buildDirectory.dir('classes/java/antlr')
    )
}

